<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formant Spot Adapter Pages</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(35, 176, 255, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(151, 255, 205, 0.12), transparent 28%),
          #08131d;
        color: #eef7ff;
        font-family: "IBM Plex Sans", "Inter", sans-serif;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 20px;
        background: rgba(5, 16, 24, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.26);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 20px;
        color: rgba(238, 247, 255, 0.72);
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 14px;
        text-decoration: none;
        color: #eef7ff;
        background: rgba(35, 176, 255, 0.18);
        border: 1px solid rgba(35, 176, 255, 0.35);
      }
      a:hover {
        background: rgba(35, 176, 255, 0.24);
      }
      code {
        font-size: 13px;
        color: #97ffcd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Formant Spot Adapter Pages</h1>
      <p>
        Hosted static pages for <code>formant-spot-adapter</code>.
      </p>
      <a href="./navigation/">
        Open navigation module
      </a>
    </main>
  </body>
  </html>
