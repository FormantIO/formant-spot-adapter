name: Deploy Spot Map Navigation UI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-map-navigation.yml"
      - "ui/map-navigation/**"
      - "ui/pages-index.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-map-navigation"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/map-navigation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/map-navigation/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble Pages Site
        run: |
          rm -rf ../../pages-site
          mkdir -p ../../pages-site/navigation
          cp -R dist/. ../../pages-site/navigation/
          cp ../pages-index.html ../../pages-site/index.html
          touch ../../pages-site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
