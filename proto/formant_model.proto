syntax = "proto3";

package v1.model;

import "google/protobuf/timestamp.proto";

message Text { string value = 1; }
message Numeric { double value = 1; }
message Bit { string key = 1; bool value = 2; }
message Bitset { repeated Bit bits = 1; }

message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Quaternion {
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;
}

message Transform {
  Vector3 translation = 1;
  Quaternion rotation = 2;
}

message Twist {
  Vector3 linear = 1;
  Vector3 angular = 2;
}

message OccupancyGrid {
  repeated int32 data = 1;
}

message Map {
  double resolution = 1;
  uint32 width = 2;
  uint32 height = 3;
  Transform origin = 4;
  Transform world_to_local = 5;
  oneof data {
    OccupancyGrid occupancy_grid = 6;
    string url = 7;
    bytes raw = 8;
  }
  string uuid = 9;
}

message Odometry {
  Transform pose = 1;
  Twist twist = 2;
  Transform world_to_local = 3;
}

message Localization {
  Odometry odometry = 1;
  Map map = 2;
}

message Image {
  string content_type = 1;
  oneof data {
    string url = 2;
    bytes raw = 3;
  }
}

message Datapoint {
  string stream = 1;
  int64 timestamp = 2;
  map<string, string> tags = 3;
  oneof data {
    Text text = 4;
    Numeric numeric = 5;
    Bitset bitset = 7;
    Image image = 9;
    Localization localization = 12;
    Map map = 21;
  }
}

message ControlDatapoint {
  string stream = 1;
  int64 timestamp = 2;
  oneof data {
    Bitset bitset = 3;
    Twist twist = 4;
  }
}

message FileInfo {
  string id = 1;
  string name = 2;
  string url = 3;
}

message CommandRequest {
  string id = 1;
  string command = 2;
  oneof parameter {
    string text = 3;
  }
  google.protobuf.Timestamp scrubber_time = 4;
  repeated FileInfo files = 5;
  google.protobuf.Timestamp created_at = 6;
}

message CommandResponse {
  string request_id = 1;
  bool success = 2;
  oneof result {
    Datapoint datapoint = 3;
  }
}
