syntax = "proto3";

package v1.model;

import "google/protobuf/timestamp.proto";

message Text { string value = 1; }
message Numeric { double value = 1; }
message Bit { string key = 1; bool value = 2; }
message Bitset { repeated Bit bits = 1; }

message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Twist {
  Vector3 linear = 1;
  Vector3 angular = 2;
}

message Image {
  string content_type = 1;
  oneof data {
    string url = 2;
    bytes raw = 3;
  }
}

message Datapoint {
  string stream = 1;
  int64 timestamp = 2;
  map<string, string> tags = 3;
  oneof data {
    Text text = 4;
    Numeric numeric = 5;
    Bitset bitset = 7;
    Image image = 9;
  }
}

message ControlDatapoint {
  string stream = 1;
  int64 timestamp = 2;
  oneof data {
    Bitset bitset = 3;
    Twist twist = 4;
  }
}

message FileInfo {
  string id = 1;
  string name = 2;
  string url = 3;
}

message CommandRequest {
  string id = 1;
  string command = 2;
  oneof parameter {
    string text = 3;
  }
  google.protobuf.Timestamp scrubber_time = 4;
  repeated FileInfo files = 5;
  google.protobuf.Timestamp created_at = 6;
}

message CommandResponse {
  string request_id = 1;
  bool success = 2;
  oneof result {
    Datapoint datapoint = 3;
  }
}
